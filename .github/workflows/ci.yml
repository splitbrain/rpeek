name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

# Least-privilege default; the release job widens this for itself.
permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

  release:
    name: Release
    needs: test
    # Only build and publish binaries for tag pushes (e.g. v1.2.3).
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release archives
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os=${target%/*}
            arch=${target#*/}
            echo "Building ${os}/${arch}"
            GOOS=$os GOARCH=$arch CGO_ENABLED=0 \
              go build -trimpath \
                -ldflags "-s -w -X rpeek/internal/version.Version=${VERSION}" \
                -o rpeek ./cmd/rpeek
            tar -czf "dist/rpeek_${VERSION}_${os}_${arch}.tar.gz" rpeek README.md
            rm -f rpeek
          done
          ( cd dist && sha256sum *.tar.gz > SHA256SUMS )

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/*
